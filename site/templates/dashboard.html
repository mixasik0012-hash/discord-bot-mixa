<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mixasik - Панель</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #fff; display: flex; min-height: 100vh; }
        .sidebar { width: 250px; background: rgba(0,0,0,0.4); padding: 1.5rem; }
        .sidebar h2 { color: #5865F2; margin-bottom: 1rem; }
        .sidebar a { display: block; color: #a0aec0; padding: 0.5rem; text-decoration: none; border-radius: 6px; }
        .sidebar a:hover { background: rgba(88,101,242,0.2); color: white; }
        .main { flex: 1; padding: 2rem; }
        .card { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; border: 1px solid rgba(255,255,255,0.1); }
        .card h3 { margin-bottom: 1rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; color: #a0aec0; margin-bottom: 0.3rem; }
        .form-group select, .form-group input, .form-group textarea { width: 100%; padding: 10px; border-radius: 8px; background: rgba(0,0,0,0.3); color: white; border: 1px solid rgba(255,255,255,0.1); }
        .toggle-group { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem; }
        .toggle { width: 46px; height: 26px; position: relative; }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.2); border-radius: 26px; transition: 0.3s; }
        .slider:before { content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background: white; border-radius: 50%; position: absolute; transition: 0.3s; }
        input:checked + .slider { background: #5865F2; }
        input:checked + .slider:before { transform: translateX(20px); }
        .btn-save { background: #5865F2; color: white; padding: 14px 32px; border: none; border-radius: 10px; font-size: 1rem; cursor: pointer; font-weight: 600; }
        .roles-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        .role-tag { background: rgba(88,101,242,0.2); padding: 4px 10px; border-radius: 20px; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; }
        .role-tag .remove { cursor: pointer; color: #ef4444; }
        .add-role-btn { background: rgba(255,255,255,0.1); border: 1px dashed rgba(255,255,255,0.3); color: #a0aec0; padding: 6px 14px; border-radius: 20px; cursor: pointer; }
        .popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a2e; padding: 1.5rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); z-index: 100; }
        .popup select { width: 100%; padding: 8px; margin-bottom: 10px; background: rgba(0,0,0,0.3); color: white; border-radius: 6px; }
        .popup button { padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-right: 8px; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
        .stat { background: rgba(88,101,242,0.1); padding: 1rem; border-radius: 10px; text-align: center; }
        .stat-num { font-size: 2rem; font-weight: bold; color: #5865F2; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>🤖 Mixasik</h2>
        <a href="#permissions">👑 Права</a>
        <a href="#welcome">👋 Приветствия</a>
        <a href="#auto-role">🔄 Авто-роль</a>
        <a href="#temp">🔊 Временные</a>
        <a href="#automod">🛡️ Автомод</a>
        <a href="/servers">🔄 Сменить сервер</a>
        <a href="/logout" style="color:#ef4444;">🚪 Выйти</a>
    </div>

    <div class="main">
        <h1>⚙️ Панель управления</h1>

        <div class="stats">
            <div class="stat"><div class="stat-num">{{ warns_count }}</div>⚠️ Варнов</div>
            <div class="stat"><div class="stat-num">{{ mutes_count }}</div>🔇 Таймаутов</div>
            <div class="stat"><div class="stat-num">{{ vmutes_count }}</div>🎤 Мьютов</div>
        </div>

        <form action="/save_settings/{{ guild_id }}" method="POST">

            <!-- Права доступа -->
            <div class="card" id="permissions">
                <h3>👑 Права доступа</h3>
                <div class="form-group">
                    <label>Роли для команд</label>
                    <div class="roles-container" id="mod-roles"></div>
                    <button type="button" class="add-role-btn" onclick="openPopup('mod')">+ Добавить</button>
                    <input type="hidden" name="moderator_role_ids" id="mod-roles-input" value="{{ settings.moderator_role_ids or '' }}">
                </div>
            </div>

            <!-- Приветствия -->
            <div class="card" id="welcome">
                <h3>👋 Приветствия</h3>
                <div class="toggle-group">
                    <label class="toggle"><input type="checkbox" name="welcome_enabled" value="1" {% if settings.welcome_enabled %}checked{% endif %}><span class="slider"></span></label>
                    <span>Включить</span>
                </div>
                <div class="form-group">
                    <label>Канал</label>
                    <select name="welcome_channel_id">
                        <option value="">Не выбран</option>
                        {% for c in channels %}<option value="{{ c.id }}" {% if settings.welcome_channel_id == c.id|string %}selected{% endif %}>#{{ c.name }}</option>{% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Текст</label>
                    <textarea name="welcome_text">{{ settings.welcome_text or '👋 Добро пожаловать!' }}</textarea>
                </div>
            </div>

            <!-- Авто-роль -->
            <div class="card" id="auto-role">
                <h3>🔄 Авто-роль</h3>
                <div class="form-group">
                    <label>Роль</label>
                    <select name="auto_role_id">
                        <option value="">Не выбрана</option>
                        {% for r in roles %}{% if r.name != '@everyone' %}<option value="{{ r.id }}" {% if settings.auto_role_id == r.id|string %}selected{% endif %}>{{ r.name }}</option>{% endif %}{% endfor %}
                    </select>
                </div>
            </div>

            <!-- Временные каналы -->
            <div class="card" id="temp">
                <h3>🔊 Временные каналы</h3>
                <div class="toggle-group">
                    <label class="toggle"><input type="checkbox" name="temp_channels_enabled" value="1" {% if settings.temp_channels_enabled %}checked{% endif %}><span class="slider"></span></label>
                    <span>Включить</span>
                </div>
                <div class="form-group">
                    <label>Канал-создатель</label>
                    <input type="text" name="temp_creator_channel_name" value="{{ settings.temp_creator_channel_name or 'test' }}">
                </div>
                <div class="form-group">
                    <label>Название каналов</label>
                    <input type="text" name="temp_channel_name" value="{{ settings.temp_channel_name or '🔊 Временный' }}">
                </div>
            </div>

            <button type="submit" class="btn-save">💾 Сохранить</button>
        </form>
    </div>

    <!-- Попап для ролей -->
    <div class="popup" id="popup">
        <select id="popup-select">
            {% for r in roles %}{% if r.name != '@everyone' %}<option value="{{ r.id }}">{{ r.name }}</option>{% endif %}{% endfor %}
        </select>
        <button onclick="addRole()" style="background:#5865F2;color:white;border:none;">Добавить</button>
        <button onclick="closePopup()" style="background:transparent;color:#a0aec0;border:1px solid rgba(255,255,255,0.2);">Отмена</button>
    </div>

    <script>
        const allRoles = { {% for r in roles %}{% if r.name != '@everyone' %}"{{ r.id }}": "{{ r.name }}",{% endif %}{% endfor %} };
        let currentTarget = '';

        function loadRoles(target) {
            const input = document.getElementById(target + '-roles-input');
            const container = document.getElementById(target + '-roles');
            if (!input || !container) return;
            const ids = input.value ? input.value.split(',') : [];
            container.innerHTML = '';
            ids.forEach(id => {
                if (id.trim() && allRoles[id.trim()]) {
                    const tag = document.createElement('span');
                    tag.className = 'role-tag';
                    tag.innerHTML = allRoles[id.trim()] + ' <span class="remove" onclick="removeRole(\'' + target + '\', \'' + id.trim() + '\')">×</span>';
                    container.appendChild(tag);
                }
            });
        }

        function openPopup(target) { currentTarget = target; document.getElementById('popup').style.display = 'block'; }
        function closePopup() { document.getElementById('popup').style.display = 'none'; }

        function addRole() {
            const select = document.getElementById('popup-select');
            const roleId = select.value;
            const input = document.getElementById(currentTarget + '-roles-input');
            let ids = input.value ? input.value.split(',').filter(id => id.trim()) : [];
            if (!ids.includes(roleId)) { ids.push(roleId); input.value = ids.join(','); loadRoles(currentTarget); }
            closePopup();
        }

        function removeRole(target, roleId) {
            const input = document.getElementById(target + '-roles-input');
            let ids = input.value ? input.value.split(',').filter(id => id.trim()) : [];
            ids = ids.filter(id => id !== roleId);
            input.value = ids.join(',');
            loadRoles(target);
        }

        loadRoles('mod');
    </script>
</body>
</html>
